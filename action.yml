name: "Angular Doctor"
description: "Diagnose Angular codebases with health score and actionable diagnostics"
branding:
  icon: "activity"
  color: "red"

inputs:
  directory:
    description: "Project directory to scan"
    default: "."
  verbose:
    description: "Show file details per rule"
    default: "true"
  project:
    description: "Workspace project(s) to scan (comma-separated)"
    required: false
  diff:
    description: "Base branch for diff mode (e.g. main). Only files changed vs this branch are scanned."
    required: false
  github-token:
    description: "GitHub token for posting PR comments. When set on pull_request events, findings are posted as a PR comment."
    required: false
  score-threshold:
    description: "Exit with error code when score is below this threshold (0-100)"
    default: "0"
    required: false
  node-version:
    description: "Node.js version to use"
    default: "20"

outputs:
  score:
    description: "Health score (0-100)"
    value: ${{ steps.score.outputs.score }}
  label:
    description: "Score label (Great, Needs work, Critical)"
    value: ${{ steps.score.outputs.label }}

runs:
  using: "composite"
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - shell: bash
      env:
        INPUT_DIRECTORY: ${{ inputs.directory }}
        INPUT_VERBOSE: ${{ inputs.verbose }}
        INPUT_PROJECT: ${{ inputs.project }}
        INPUT_DIFF: ${{ inputs.diff }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        FLAGS=""
        if [ "$INPUT_VERBOSE" = "true" ]; then FLAGS="$FLAGS --verbose"; fi
        if [ -n "$INPUT_PROJECT" ]; then FLAGS="$FLAGS --project $INPUT_PROJECT"; fi
        if [ -n "$INPUT_DIFF" ]; then FLAGS="$FLAGS --diff $INPUT_DIFF"; fi

        if [ -n "$INPUT_GITHUB_TOKEN" ]; then
          npx -y angular-doctor@latest "$INPUT_DIRECTORY" $FLAGS 2>&1 | tee /tmp/angular-doctor-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
        else
          npx -y angular-doctor@latest "$INPUT_DIRECTORY" $FLAGS
          EXIT_CODE=$?
        fi

        echo "ANGULAR_DOCTOR_EXIT_CODE=$EXIT_CODE" >> $GITHUB_ENV

    - id: score
      if: always()
      shell: bash
      env:
        INPUT_DIRECTORY: ${{ inputs.directory }}
      run: |
        SCORE=$(npx -y angular-doctor@latest "$INPUT_DIRECTORY" --score 2>/dev/null | tail -1 | tr -d '[:space:]')
        if [[ -n "$SCORE" && "$SCORE" =~ ^[0-9]+$ ]]; then
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"
          
          if [ "$SCORE" -ge 75 ]; then
            echo "label=Great" >> "$GITHUB_OUTPUT"
          elif [ "$SCORE" -ge 50 ]; then
            echo "label=Needs work" >> "$GITHUB_OUTPUT"
          else
            echo "label=Critical" >> "$GITHUB_OUTPUT"
          fi
        fi

    - if: ${{ inputs.github-token != '' && github.event_name == 'pull_request' }}
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require("fs");
          const path = "/tmp/angular-doctor-output.txt";
          if (!fs.existsSync(path)) return;
          const output = fs.readFileSync(path, "utf8").trim();
          if (!output) return;

          const score = output.match(/^\s*(\d+)\s*\/\s*100/)?.[1] || "N/A";
          const label = output.match(/Great|Needs work|Critical/)?.[0] || "N/A";

          const marker = "<!-- angular-doctor -->";
          const body = `${marker}\n## 🩺 Angular Doctor\n\n**Score:** ${score} / 100 — ${label}\n\n\`\`\`\n${output}\n\`\`\``;

          const { data: comments } = await github.rest.issues.listComments({
            ...context.repo,
            issue_number: context.issue.number,
          });
          const prev = comments.find((c) => c.body?.startsWith(marker));
          if (prev) {
            await github.rest.issues.deleteComment({
              ...context.repo,
              comment_id: prev.id,
            });
          }

          await github.rest.issues.createComment({
            ...context.repo,
            issue_number: context.issue.number,
            body,
          });

    - shell: bash
      if: ${{ inputs.score-threshold != '0' && inputs.score-threshold != '' }}
      env:
        INPUT_SCORE_THRESHOLD: ${{ inputs.score-threshold }}
      run: |
        SCORE_THRESHOLD=$INPUT_SCORE_THRESHOLD
        CURRENT_SCORE=$(npx -y angular-doctor@latest "$INPUT_DIRECTORY" --score 2>/dev/null | tail -1 | tr -d '[:space:]')
        
        if [[ -n "$CURRENT_SCORE" && "$CURRENT_SCORE" =~ ^[0-9]+$ ]]; then
          if [ "$CURRENT_SCORE" -lt "$SCORE_THRESHOLD" ]; then
            echo "Score $CURRENT_SCORE is below threshold $SCORE_THRESHOLD"
            exit 1
          fi
        fi
